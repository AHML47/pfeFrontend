<div class="product-card">
  <div class="card-img">
    <img [src]="product.image" [alt]="product.name" />
  </div>

  <div class="card-body">
    <h3 class="product-name">{{ product.name }}</h3>
    <p class="product-price">{{ product.price | number:'1.1-2' }} TND</p>

    <button class="btn-add-cart" (click)="addToCart()" title="Ajouter au panier">
      🛒 Add to Cart
    </button>
  </div>
</div>
