<article class="product-card">
  <div class="card-img" (click)="goToDetails()">
    <span *ngIf="stock <= 5" class="badge-stock">Stock limité</span>
    <img [src]="image" [alt]="title" />
  </div>

  <div class="card-body">
    <p class="product-category">{{ category }}</p>
    <h3 class="product-name">{{ title }}</h3>
    <p class="product-description">{{ description }}</p>
    <p class="product-price">{{ price | number:'1.1-2' }} TND</p>
    <div class="card-actions">
      <button class="btn-liquid" (click)="addToCart()">Ajouter au panier</button>
      <button class="btn-ghost" (click)="goToDetails()">Détails</button>
    </div>
  </div>
</article>
