<nav class="glass-panel sticky top-0 z-50 w-full px-6 py-4 backdrop-blur-xl border-b border-white/10 dark:border-slate-800/50">
  <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4">
    <h1 class="font-display text-2xl font-bold text-start">DeliverWholesale</h1>

    <div class="flex items-center gap-5 md:gap-7">
      @for (link of navLinks; track link.key) {
        <a #liquidLink class="liquid-link bg-gradient-to-r from-wheat/40 to-transparent bg-[length:200%_100%] bg-no-repeat px-1" [routerLink]="link.route" routerLinkActive="font-semibold" [routerLinkActiveOptions]="{ exact: link.route === '/' }">{{ link.key | translate }}</a>
      }
      @if (auth.isAdmin()) {
        <a #liquidLink class="liquid-link bg-gradient-to-r from-wheat/40 to-transparent bg-[length:200%_100%] bg-no-repeat px-1" routerLink="/admin" routerLinkActive="font-semibold">{{ 'NAV.ADMIN' | translate }}</a>
      }
    </div>

    <div class="flex items-center gap-3 ms-auto">
      @if (!auth.isAuthenticated()) {
        <a #magneticBtn class="magnetic-btn rounded-full px-4 py-2 text-xs font-semibold" routerLink="/login">{{ 'NAV.LOGIN' | translate }}</a>
      } @else {
        <button #magneticBtn type="button" class="magnetic-btn rounded-full px-4 py-2 text-xs font-semibold" (click)="logout()">{{ 'NAV.LOGOUT' | translate }}</button>
      }

      <button
        type="button"
        class="glass-panel inline-flex h-9 w-9 items-center justify-center rounded-full transition-transform duration-300"
        (click)="toggleTheme()"
        [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <span class="block transition-transform duration-500" [class.rotate-180]="isDarkMode">
          @if (isDarkMode) {
            ☀️
          } @else {
            🌙
          }
        </span>
      </button>

      <select class="glass-panel rounded-full px-3 py-2 text-xs font-semibold text-start" [value]="currentLanguage" (change)="changeLanguage(($any($event.target).value))">
        <option value="en">{{ 'LANG.ENGLISH' | translate }}</option>
        <option value="fr">{{ 'LANG.FRENCH' | translate }}</option>
        <option value="ar">{{ 'LANG.ARABIC' | translate }}</option>
      </select>
    </div>
  </div>
</nav>
