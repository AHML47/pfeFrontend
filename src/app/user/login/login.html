<div class="auth-shell">
  <div class="blob blob-a"></div><div class="blob blob-b"></div>
  <section class="glass-panel auth-card organic-drift">
    <h1 class="text-center text-3xl text-olive-900 dark:text-lime-300">DeliverWholesale</h1>
    <p class="mb-4 text-center text-sm">{{ isRegisterMode ? 'Créer un compte' : 'Se connecter' }}</p>
    <button type="button" class="switch-btn" (click)="toggleMode()">{{ isRegisterMode ? 'Retour connexion' : 'Créer un compte' }}</button>
    <p *ngIf="error" class="error-msg">{{ error }}</p>
    <form *ngIf="!isRegisterMode" (ngSubmit)="login()" class="space-y-4">
      <label class="float-field"><input name="loginEmail" [(ngModel)]="loginEmail" type="email" required placeholder=" "><span>Email</span></label>
      <label class="float-field"><input name="loginPassword" [(ngModel)]="loginPassword" type="password" required placeholder=" "><span>Mot de passe</span></label>
      <button class="submit-btn" [disabled]="loading">{{loading?'Connexion...':'Se connecter'}}</button>
    </form>
    <form *ngIf="isRegisterMode" (ngSubmit)="register()" class="space-y-4">
      <label class="float-field"><input name="registerName" [(ngModel)]="registerName" type="text" placeholder=" "><span>Nom complet</span></label>
      <label class="float-field"><input name="registerEmail" [(ngModel)]="registerEmail" type="email" placeholder=" "><span>Email</span></label>
      <label class="float-field"><input name="registerAddress" [(ngModel)]="registerAddress" type="text" placeholder=" "><span>Adresse</span></label>
      <label class="float-field"><input name="registerPassword" [(ngModel)]="registerPassword" type="password" placeholder=" "><span>Mot de passe</span></label>
      <label class="float-field"><input name="registerConfirmPassword" [(ngModel)]="registerConfirmPassword" type="password" placeholder=" "><span>Confirmer le mot de passe</span></label>
      <button class="submit-btn" [disabled]="loading">{{loading?'Création...':'Créer mon compte'}}</button>
    </form>
  </section>
</div>
