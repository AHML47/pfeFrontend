<div class="login-container">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <h1>🛍️ DeliverWholesale</h1>
      <p>{{ isRegisterMode ? 'Créer un compte' : 'Se connecter' }}</p>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button
        [class.active]="!isRegisterMode"
        (click)="toggleMode()"
        class="toggle-btn"
        *ngIf="isRegisterMode"
      >
        ← Retour à la connexion
      </button>

      <button
        [class.active]="isRegisterMode"
        (click)="toggleMode()"
        class="toggle-btn"
        *ngIf="!isRegisterMode"
      >
        Créer un compte →
      </button>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <!-- ========== LOGIN FORM ========== -->
    <form *ngIf="!isRegisterMode" (ngSubmit)="login()" novalidate>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="loginEmail"
          name="loginEmail"
          class="form-control"
          placeholder="votre@email.com"
          [disabled]="loading"
          required
        />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="loginPassword"
          name="loginPassword"
          class="form-control"
          placeholder="********"
          [disabled]="loading"
          required
        />
      </div>

      <button type="submit" class="btn btn-login w-100" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

    </form>

    <!-- ========== REGISTER FORM ========== -->
    <form *ngIf="isRegisterMode" (ngSubmit)="register()" novalidate>

      <div class="form-group">
        <label>Nom complet</label>
        <input
          type="text"
          [(ngModel)]="registerName"
          name="registerName"
          class="form-control"
          placeholder="Votre nom"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="registerEmail"
          name="registerEmail"
          class="form-control"
          placeholder="votre@email.com"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input
          type="text"
          [(ngModel)]="registerAddress"
          name="registerAddress"
          class="form-control"
          placeholder="Votre adresse"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="registerPassword"
          name="registerPassword"
          class="form-control"
          placeholder="********"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label>Confirmer mot de passe</label>
        <input
          type="password"
          [(ngModel)]="registerConfirmPassword"
          name="registerConfirmPassword"
          class="form-control"
          placeholder="********"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn btn-login w-100" [disabled]="loading">
        {{ loading ? 'Création...' : 'Créer un compte' }}
      </button>

    </form>

  </div>
</div>
