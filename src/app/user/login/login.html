<div class="auth-shell">
  <div class="orb orb-start"></div>
  <div class="orb orb-end"></div>

  <section class="auth-card glass-panel">
    <p class="kicker">Wholesale alimentaire premium</p>
    <h1 class="title">Bienvenue sur DeliverWholesale</h1>
    <p class="subtitle">Accédez à vos commandes B2B, gérez votre activité et profitez d'une expérience fluide.</p>

    <div class="mode-switch" role="tablist" aria-label="Authentication mode">
      <button type="button" [class.active]="!isRegisterMode" (click)="isRegisterMode || toggleMode()">Connexion</button>
      <button type="button" [class.active]="isRegisterMode" (click)="!isRegisterMode || toggleMode()">Inscription</button>
    </div>

    <p *ngIf="error" class="error-msg">{{ error }}</p>

    <form *ngIf="!isRegisterMode" (ngSubmit)="login()" class="form-grid">
      <label class="float-field">
        <input [(ngModel)]="loginEmail" name="loginEmail" type="email" placeholder=" " required />
        <span>Email professionnel</span>
      </label>
      <label class="float-field">
        <input [(ngModel)]="loginPassword" name="loginPassword" type="password" placeholder=" " required />
        <span>Mot de passe</span>
      </label>
      <button type="submit" class="cta-btn" [disabled]="loading">{{ loading ? 'Connexion...' : 'Se connecter' }}</button>
    </form>

    <form *ngIf="isRegisterMode" (ngSubmit)="register()" class="form-grid">
      <label class="float-field"><input [(ngModel)]="registerName" name="registerName" type="text" placeholder=" " /><span>Nom complet</span></label>
      <label class="float-field"><input [(ngModel)]="registerEmail" name="registerEmail" type="email" placeholder=" " /><span>Email professionnel</span></label>
      <label class="float-field"><input [(ngModel)]="registerAddress" name="registerAddress" type="text" placeholder=" " /><span>Adresse</span></label>
      <label class="float-field"><input [(ngModel)]="registerPassword" name="registerPassword" type="password" placeholder=" " /><span>Mot de passe</span></label>
      <label class="float-field"><input [(ngModel)]="registerConfirmPassword" name="registerConfirmPassword" type="password" placeholder=" " /><span>Confirmer le mot de passe</span></label>
      <button type="submit" class="cta-btn" [disabled]="loading">{{ loading ? 'Création...' : 'Créer un compte' }}</button>
    </form>
  </section>
</div>
