<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <h1>🛍️ DeliverWholesale</h1>
      <p>{{ isAdminMode ? 'Connexion Admin' : (isRegisterMode ? 'Créer un compte' : 'Se connecter') }}</p>
    </div>

    <!-- Login Type Toggle (Client vs Admin) -->
    <div class="login-type-toggle">
      <button 
        type="button"
        [class.active]="!isAdminMode" 
        (click)="toggleAdminMode()"
        class="type-btn"
      >
        👤 Client
      </button>
      <button 
        type="button"
        [class.active]="isAdminMode" 
        (click)="toggleAdminMode()"
        class="type-btn"
      >
        ⚙️ Admin
      </button>
    </div>

    <!-- ========== CLIENT LOGIN MODE ========== -->
    <ng-container *ngIf="!isAdminMode">

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button
          [class.active]="!isRegisterMode"
          (click)="toggleMode()"
          class="toggle-btn"
          *ngIf="isRegisterMode"
        >
          ← Retour à la connexion
        </button>
        <button
          [class.active]="isRegisterMode"
          (click)="toggleMode()"
          class="toggle-btn"
          *ngIf="!isRegisterMode"
        >
          Créer un compte →
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="error && !isAdminMode" class="alert alert-danger">
        {{ error }}
      </div>

      <!-- LOGIN FORM -->
      <form *ngIf="!isRegisterMode" (ngSubmit)="login()" novalidate #loginForm="ngForm">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            [(ngModel)]="loginEmail"
            name="loginEmail"
            class="form-control"
            placeholder="votre@email.com"
            [disabled]="loading"
            required
          />
        </div>

        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input
            type="password"
            id="login-password"
            [(ngModel)]="loginPassword"
            name="loginPassword"
            class="form-control"
            placeholder="Entrez votre mot de passe"
            [disabled]="loading"
            required
          />
        </div>

        <button type="submit" class="btn btn-login w-100" [disabled]="loading">
          {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form *ngIf="isRegisterMode" (ngSubmit)="register()" novalidate #registerForm="ngForm">

        <div class="form-group">
          <label for="register-name">Nom complet</label>
          <input
            type="text"
            id="register-name"
            [(ngModel)]="registerName"
            name="registerName"
            class="form-control"
            placeholder="Votre nom"
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            [(ngModel)]="registerEmail"
            name="registerEmail"
            class="form-control"
            placeholder="votre@email.com"
            [disabled]="loading"
          />
        </div>

        <!-- ✅ ADRESSE AJOUTÉE ICI -->
        <div class="form-group">
          <label for="register-address">Adresse</label>
          <input
            type="text"
            id="register-address"
            [(ngModel)]="registerAddress"
            name="registerAddress"
            class="form-control"
            placeholder="Votre adresse complète"
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="register-password">Mot de passe</label>
          <input
            type="password"
            id="register-password"
            [(ngModel)]="registerPassword"
            name="registerPassword"
            class="form-control"
            placeholder="Entrez votre mot de passe"
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="register-confirm">Confirmer le mot de passe</label>
          <input
            type="password"
            id="register-confirm"
            [(ngModel)]="registerConfirmPassword"
            name="registerConfirmPassword"
            class="form-control"
            placeholder="Confirmez votre mot de passe"
            [disabled]="loading"
          />
        </div>

        <button type="submit" class="btn btn-login w-100" [disabled]="loading">
          {{ loading ? 'Création du compte...' : 'Créer un compte' }}
        </button>

      </form>

    </ng-container>

    <!-- ========== ADMIN LOGIN MODE ========== -->
    <ng-container *ngIf="isAdminMode">

      <div *ngIf="errorAdmin" class="alert alert-danger">
        {{ errorAdmin }}
      </div>

      <form (ngSubmit)="adminLogin()" novalidate #adminForm="ngForm">
        <div class="form-group">
          <label for="admin-email">Email Admin</label>
          <input
            type="email"
            id="admin-email"
            [(ngModel)]="adminEmail"
            name="adminEmail"
            class="form-control"
            placeholder="admin@deliverwholesale.com"
            [disabled]="loading"
            required
          />
        </div>

        <div class="form-group">
          <label for="admin-password">Mot de passe</label>
          <input
            type="password"
            id="admin-password"
            [(ngModel)]="adminPassword"
            name="adminPassword"
            class="form-control"
            placeholder="Entrez votre mot de passe"
            [disabled]="loading"
            required
          />
        </div>

        <button type="submit" class="btn btn-admin w-100" [disabled]="loading">
          {{ loading ? 'Connexion en cours...' : 'Se connecter Admin' }}
        </button>
      </form>

      

    </ng-container>

  </div>
</div>
