<div class="auth-shell admin-shell">
  <div class="orb orb-start"></div>
  <div class="orb orb-end"></div>

  <section class="auth-card glass-panel">
    <p class="kicker">Espace sécurisé</p>
    <h1 class="title">Connexion Administrateur</h1>
    <p class="subtitle">Contrôlez stocks, commandes et opérations depuis le dashboard centralisé.</p>

    <form (ngSubmit)="login()" class="form-grid">
      <label class="float-field"><input [(ngModel)]="email" name="email" type="email" placeholder=" " required /><span>Email admin</span></label>
      <label class="float-field"><input [(ngModel)]="password" name="password" type="password" placeholder=" " required /><span>Mot de passe</span></label>
      <p *ngIf="error" class="error-msg">{{ error }}</p>
      <button type="submit" class="cta-btn" [disabled]="loading">{{ loading ? 'Connexion en cours...' : 'Se connecter au dashboard' }}</button>
    </form>
  </section>
</div>
