<div class="login-container">
  <div class="login-card">
    <h1>🔐 Connexion Admin</h1>
    
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="admin@deliverwholesale.com"
          required
        />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading" class="btn btn-primary">
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>

    <p class="help-text">Identifiants de test :<br>Email: admin@deliverwholesale.com<br>Mot de passe: admin123</p>
  </div>
</div>
