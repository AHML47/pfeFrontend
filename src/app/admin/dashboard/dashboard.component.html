<div class="admin-dashboard">

  <!-- HEADER -->
  <div class="dashboard-header">
    <div>
      <h1>📊 Tableau de Bord Admin</h1>
      <p>Gestion complète de la plateforme</p>
    </div>

    <button (click)="logout()" class="btn btn-danger" type="button">
      Déconnexion
    </button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button
      type="button"
      *ngFor="let tab of tabs"
      (click)="switchTab(tab.id)">
      {{ tab.icon }} {{ tab.label }}
    </button>
  </div>

  <!-- LOADING -->
  <div *ngIf="loading">
    ⏳ Chargement...
  </div>

  <!-- CONTENT -->
  <ng-container *ngIf="activeTab$ | async as activeTab">

    <div [hidden]="activeTab !== 'overview'">
      <app-admin-overview [stats]="dashboardStats"></app-admin-overview>
    </div>

    <div [hidden]="activeTab !== 'categories'">
      <app-category></app-category>
    </div>

    <div [hidden]="activeTab !== 'products'">
      <app-admin-products></app-admin-products>
    </div>

    <div [hidden]="activeTab !== 'stocks'">
      <app-admin-stocks></app-admin-stocks>
    </div>

    <div [hidden]="activeTab !== 'orders'">
      <app-admin-orders></app-admin-orders>
    </div>

    <div [hidden]="activeTab !== 'ai'">
      <app-admin-ai></app-admin-ai>
    </div>

    <div [hidden]="activeTab !== 'reclamations'">
      <app-admin-reclamations></app-admin-reclamations>
    </div>

    <div [hidden]="activeTab !== 'notifications'">

      <h3>🔔 Notifications</h3>

      <div *ngIf="notifications.length === 0">
        Aucune notification
      </div>

      <ul>
        <li *ngFor="let n of notifications">
          {{ n.message }}
        </li>
      </ul>

    </div>

  </ng-container>

</div>
