<div class="container">

  <h2>📦 Achat Produit</h2>

  <form (ngSubmit)="onSubmit()" #form="ngForm">

    <!-- PRODUIT -->
    <label>Produit</label>
    <select [(ngModel)]="stock.produitId" name="produitId" required>
      <option [ngValue]="null">-- Choisir produit --</option>
      <option *ngFor="let p of produits" [ngValue]="p.id">
        {{ p.nom }}
      </option>
    </select>

    <!-- QUANTITE -->
    <label>Quantité</label>
    <input type="number" [(ngModel)]="stock.quantiteAchetee" name="qte" required>

    <!-- PRIX -->
    <label>Prix Unitaire</label>
    <input type="number" [(ngModel)]="stock.prixUnitaire" name="prix" required>

    <!-- FOURNISSEUR -->
    <label>Fournisseur</label>
    <input type="text" [(ngModel)]="stock.fournisseur" name="fournisseur">

    <!-- LOT -->
    <label>Numéro Lot</label>
    <input type="text" [(ngModel)]="stock.numeroLot" name="lot">

    <button type="submit" [disabled]="form.invalid">
      Ajouter Achat
    </button>

  </form>

  <p class="message">{{ message }}</p>

  <hr>

  <h3>📊 Stock actuel</h3>

  <table>
    <tr>
      <th>Produit</th>
      <th>Lot</th>
      <th>Quantité</th>
    </tr>

    <tr *ngFor="let s of stocks">
      <td>{{ s.achatLot?.produit?.nom }}</td>
      <td>{{ s.numeroLot }}</td>
      <td>{{ s.quantiteRestante }}</td>
    </tr>
  </table>

</div>
