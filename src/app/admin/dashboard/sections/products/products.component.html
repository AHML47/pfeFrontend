<div class="products-container">

  <div class="header">
    <h2>📦 Produits</h2>
    <button class="btn-primary" (click)="openAddForm()">➕ Ajouter</button>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <input
    type="text"
    [(ngModel)]="searchQuery"
    (keyup)="onSearch()"
    placeholder="🔍 Rechercher..."
    class="search-input"
  />

  <!-- TABLE -->
  <table *ngIf="filteredProducts.length > 0">
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Prix</th>
        <th>Catégorie</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of filteredProducts">
        <td>{{ p.id }}</td>
        <td>{{ p.nom }}</td>
        <td>{{ p.prixAchat }} TND</td>
        <td>{{ getCategoryName(p.categorieId) }}</td>
        <td>
          <button (click)="openEditForm(p)">✏️</button>
          <button (click)="delete(p.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="filteredProducts.length === 0">
    Aucun produit
  </p>

  <!-- ================= FORMULAIRE SIMPLE ================= -->
  <div class="form-container" *ngIf="showForm">

    <h3>
      {{ editMode ? '✏️ Modifier produit' : '➕ Ajouter produit' }}
    </h3>

    <p class="error" *ngIf="error">{{ error }}</p>

    <input type="text" [(ngModel)]="form.nom" placeholder="Nom" />

    <input type="text" [(ngModel)]="form.description" placeholder="Description" />

    <input type="number" [(ngModel)]="form.prix" placeholder="Prix" />

    <select [(ngModel)]="form.categorieId">
      <option [ngValue]="0">-- Catégorie --</option>
      <option *ngFor="let c of categories" [ngValue]="c.id">
        {{ c.nom }}
      </option>
    </select>

    <div class="actions">
      <button class="btn-primary" (click)="save()">💾 Enregistrer</button>
      <button class="btn-secondary" (click)="closeForm()">❌ Annuler</button>
    </div>

  </div>

</div>
