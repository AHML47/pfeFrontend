<div class="container">

  <div class="header">
    <h2>Catégories</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Ajouter</button>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <ng-container *ngIf="categories$ | async as categories">

    <table *ngIf="categories.length > 0">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let c of categories">
          <td>{{ c.id }}</td>
          <td>{{ c.nom }}</td>
          <td>{{ c.description }}</td>
          <td>
            <button class="btn btn-edit" (click)="openEdit(c)">Modifier</button>
            <button class="btn btn-delete" (click)="delete(c.id)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="categories.length === 0">
      Aucune catégorie
    </p>

  </ng-container>

</div>

<!-- ================= MODAL ================= -->
<div class="modal-overlay" *ngIf="showForm" (click)="resetForm()">

  <div class="modal-content" (click)="$event.stopPropagation()">

    <h3>
      {{ editingCategory ? 'Modifier catégorie' : 'Ajouter catégorie' }}
    </h3>

    <input
      type="text"
      placeholder="Nom"
      [(ngModel)]="formNom"
    />

    <input
      type="text"
      placeholder="Description"
      [(ngModel)]="formDescription"
    />

    <div class="actions">
      <button class="btn btn-cancel" (click)="resetForm()">Annuler</button>
      <button class="btn btn-primary" (click)="submitForm()">Enregistrer</button>
    </div>

  </div>

</div>
